# ttstt 설정 파일
# 이 파일을 ~/.config/ttstt/config.toml 에 복사해서 사용하세요.

[asr]
# ASR 모델 (HuggingFace model ID)
# 옵션: "mlx-community/Qwen3-ASR-1.7B-8bit", "mlx-community/Qwen3-ASR-0.6B-8bit"
model = "mlx-community/Qwen3-ASR-1.7B-8bit"

# 최대 토큰 수 (긴 녹음은 128000 정도로 설정)
max_tokens = 8192

# 언어 설정 ("Korean", "English", 또는 자동감지시 빈 문자열)
# 한국어+영어 혼합 환경에서는 빈 문자열(자동감지)을 권장
language = ""

# ASR 시스템 프롬프트 (핫워드, 언어 힌트 등 soft biasing)
# 자주 쓰는 용어를 넣으면 인식 정확도가 올라갈 수 있음
system_prompt = ""

# 반복 출력 방지 (0이면 비활성화, 권장: 1.1~1.3)
repetition_penalty = 0.0

[postprocess]
# 후처리 LLM 활성화 여부
enabled = false

# 후처리 LLM 모델 (HuggingFace model ID)
# 옵션 예시: "mlx-community/Qwen3.5-4B-4bit", "mlx-community/Qwen3.5-1.7B-4bit"
model = "mlx-community/Qwen3.5-4B-4bit"

# 후처리 최대 토큰 수
max_tokens = 4096

# 후처리 시스템 프롬프트 (커스텀 가능)
system_prompt = """음성인식 결과를 교정해주세요.
- 오탈자와 잘못 인식된 단어를 수정
- 문장 부호 정리
- 원문의 의미와 어투를 최대한 유지
- 한국어와 영어가 혼합된 텍스트에 주의
- 교정된 텍스트만 출력 (설명 없이)"""

[hotkey]
# 모드: "tap_hold" (길게 누르면 녹음, 짧게 누르면 일반 입력) 또는 "toggle" (누를 때마다 토글)
mode = "tap_hold"

# 키: "space", 알파벳 소문자, "\\" 등
key = "space"

# 홀드 판정 시간 (초, tap_hold 모드 전용)
hold_threshold = 0.3

# modifier: toggle 모드에서만 사용 ("cmd+shift", "cmd+option" 등)
modifier = "cmd+shift"

# 재붙여넣기 핫키 (마지막 전사 텍스트를 다시 붙여넣기)
repaste_modifier = "cmd+shift"
repaste_key = ";"

[audio]
# 마이크 디바이스 (빈 문자열이면 시스템 기본 인풋)
device = ""

# 샘플링 레이트 (Hz)
sample_rate = 16000

# 채널 수
channels = 1

[sound]
# 녹음 시작 사운드 (macOS 시스템 사운드 이름)
start = "Blow"

# 녹음 종료 사운드
stop = "Submarine"

[meeting]
# 청크 길이 (초). 이 간격마다 녹음을 전사하여 파일에 추가한다.
chunk_duration = 60

# 출력 디렉토리 (빈 문자열이면 ~/.local/share/ttstt/meetings)
output_dir = ""

[meeting.asr]
# 회의 모드 전용 ASR 설정 (일반 모드와 별도)
model = "mlx-community/Qwen3-ASR-1.7B-8bit"

# 회의 모드는 긴 청크를 처리하므로 max_tokens를 크게 설정
max_tokens = 32768

language = ""
system_prompt = ""
repetition_penalty = 0.0
